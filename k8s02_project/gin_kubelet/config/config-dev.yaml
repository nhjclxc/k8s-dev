app:
  name: gin_kubelet-dev
  env: gin_kubelet-dev
  version: dev-1.1.1
  debug: true

# HTTP 服务配置
http:
  port: 9090
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

# 日志配置
log:
  level: "info" # debug, info, warn, error
  format: "json" # json, text
  output: "stdout" # stdout, file
  file_path: "logs/app.log" # 日志文件路径
  max_size: 100 # 单个文件最大大小（MB）
  max_backups: 10 # 保留的旧文件数量
  max_age: 30 # 保留的最大天数
  compress: true # 是否压缩旧文件

# 定时任务配置
cron:
  timezone: "Asia/Shanghai"
  tasks:
    - name: "example_task"
      #      spec: "*/3 * * * * *" # 每 3s 执行一次
      spec: "0 * * * * *" # 每 1min 执行一次
      enabled: true

